name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret
          APP_ENCRYPTION_KEY: test-encryption-key-1234567890
          SOCIAL_FORCE_MOCK: "true"
        run: python manage.py test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify frontend build
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/schedra-api:main
            ${{ secrets.DOCKERHUB_USERNAME }}/schedra-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/schedra-web:main
            ${{ secrets.DOCKERHUB_USERNAME }}/schedra-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify deploy listener
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' && secrets.DEPLOY_WEBHOOK_TOKEN != '' }}
        shell: bash
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          payload=$(cat <<EOF
          {"ref":"${GITHUB_REF}","sha":"${GITHUB_SHA}","services":["api","web"]}
          EOF
          )

          attempt=1
          max_attempts=5
          delay=15

          while true; do
            status=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "$DEPLOY_WEBHOOK_URL" \
              -H "content-type: application/json" \
              -H "x-deploy-token: $DEPLOY_WEBHOOK_TOKEN" \
              --data "$payload" || true)

            echo "Attempt $attempt/$max_attempts -> HTTP $status"
            cat response.json || true
            echo

            if [ "$status" = "200" ]; then
              exit 0
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Deploy notify failed after $max_attempts attempts" >&2
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep "$delay"
          done

      - name: Skip deploy notify when webhook is not configured
        if: ${{ secrets.DEPLOY_WEBHOOK_URL == '' || secrets.DEPLOY_WEBHOOK_TOKEN == '' }}
        run: echo "DEPLOY_WEBHOOK_URL or DEPLOY_WEBHOOK_TOKEN is not configured, skipping VPS notify."
